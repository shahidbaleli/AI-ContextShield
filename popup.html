<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Context Keeper Settings</title>
  <style>
    body {
      width: 240px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
      color: #333;
    }
    h3 { margin-top: 0; text-align: center; font-size: 16px; }
    
    .switch-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      padding: 10px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px; width: 14px;
      left: 3px; bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #28a745; }
    input:checked + .slider:before { transform: translateX(20px); }

    #popupInjectSection {
      margin-top: 12px;
      display: none;
    }
    #popupInjectBtn {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    #popupInjectBtn:hover { background: #0056b3; }
    #showOnPageBtn {
      width: 100%;
      margin-top: 6px;
      padding: 6px;
      background: transparent;
      color: #666;
      border: 1px dashed #aaa;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    #showOnPageBtn:hover {
      background: #f0f0f0;
      color: #333;
      border-color: #888;
    }
    #floatingHint {
      font-size: 11px;
      text-align: center;
      color: #666;
      margin-top: 15px;
    }
    #popupHint {
      font-size: 11px;
      text-align: center;
      color: #888;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h3>⚡ AI Context Keeper</h3>
  
  <div class="switch-container">
    <span style="font-size: 14px; font-weight: bold;">Auto-Save Chat</span>
    <label class="switch">
      <input type="checkbox" id="autoSaveToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div id="popupInjectSection">
    <button id="popupInjectBtn">📎 Inject Context</button>
    <button id="showOnPageBtn">⬇ Show on Page</button>
    <div id="popupHint">Clicking a saved chat injects it into the AI prompt</div>
  </div>

  <p id="floatingHint">
    Use the floating button on the AI page to inject chats.
  </p>

  <div style="margin-top: 14px; border-top: 1px solid #ddd; padding-top: 8px; text-align: center; font-size: 10px; color: #999;">
   © 2026 AI Contextshield
  </div>

  <script src="popup.js"></script>
</body>
</html
